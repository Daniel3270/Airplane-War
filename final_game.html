<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>飞机大战 - Enhanced Edition</title>
    <style>
        :root {
            --bg-0: #050b1a;
            --bg-1: #0f1935;
            --bg-2: #1c2f4f;
            --cyan: #61d2ff;
            --panel: rgba(7, 15, 33, 0.72);
            --line: rgba(150, 215, 255, 0.4);
            --text: #dceeff;
            --text-weak: #9bb9cf;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html,
        body {
            width: 100%;
            min-height: 100%;
        }

        body {
            display: grid;
            place-items: center;
            padding: 20px;
            color: var(--text);
            font-family: "Segoe UI", "Microsoft YaHei", sans-serif;
            background:
                radial-gradient(120% 70% at 50% 10%, rgba(86, 154, 255, 0.2), transparent 60%),
                radial-gradient(90% 70% at 20% 90%, rgba(255, 155, 67, 0.16), transparent 65%),
                linear-gradient(160deg, var(--bg-0), var(--bg-1) 48%, var(--bg-2));
            overflow: hidden;
        }

        #game-shell {
            position: relative;
            width: min(92vw, 460px);
            aspect-ratio: 7 / 12;
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid var(--line);
            background: rgba(0, 0, 0, 0.35);
            box-shadow:
                0 28px 50px rgba(0, 0, 0, 0.55),
                inset 0 0 40px rgba(95, 168, 255, 0.12);
        }

        #game-canvas {
            width: 100%;
            height: 100%;
            display: block;
            touch-action: none;
            cursor: crosshair;
        }

        #hud {
            position: absolute;
            top: 6px;
            left: 6px;
            right: 6px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 5px;
            z-index: 20;
            pointer-events: none;
        }

        .hud-panel {
            background: rgba(7, 15, 33, 0.52);
            border: 1px solid var(--line);
            border-radius: 10px;
            padding: 6px 8px;
            backdrop-filter: blur(4px);
            min-width: 104px;
            max-width: 48%;
        }

        .hud-label {
            color: var(--text-weak);
            font-size: 12px;
            letter-spacing: 0.06em;
            text-transform: uppercase;
        }

        .hud-value {
            margin-top: 2px;
            font-size: 18px;
            font-weight: 700;
            line-height: 1;
        }

        .hud-small {
            margin-top: 3px;
            font-size: 11px;
            color: var(--text-weak);
        }

        #audio-toggle,
        #pause-toggle {
            margin-top: 0;
            width: auto;
            flex: 1 1 0;
            border: 1px solid rgba(160, 212, 255, 0.7);
            border-radius: 8px;
            padding: 5px 7px;
            background: rgba(18, 34, 62, 0.85);
            color: #cfe9ff;
            font-size: 11px;
            cursor: pointer;
            pointer-events: auto;
        }

        .hud-actions {
            display: flex;
            gap: 5px;
            pointer-events: auto;
        }

        #hud-controls {
            position: absolute;
            right: 6px;
            bottom: 8px;
            z-index: 22;
        }

        #audio-toggle:disabled,
        #pause-toggle:disabled {
            opacity: 0.55;
            cursor: not-allowed;
        }

        #pause-pill {
            position: absolute;
            top: 14px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 25;
            padding: 6px 12px;
            border-radius: 999px;
            background: rgba(255, 90, 95, 0.18);
            border: 1px solid rgba(255, 130, 130, 0.6);
            color: #ffe2e2;
            font-size: 12px;
            letter-spacing: 0.05em;
            display: none;
        }

        .overlay {
            position: absolute;
            inset: 0;
            z-index: 30;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            background: linear-gradient(160deg, rgba(5, 9, 22, 0.9), rgba(8, 17, 36, 0.78));
            padding: 24px;
        }

        .overlay.hidden {
            display: none;
        }

        .overlay h1,
        .overlay h2 {
            font-size: clamp(28px, 6vw, 38px);
            line-height: 1.12;
            margin-bottom: 10px;
            text-shadow: 0 8px 30px rgba(0, 0, 0, 0.45);
        }

        .overlay p {
            max-width: 340px;
            line-height: 1.6;
            color: #d4e6f7;
            margin-bottom: 14px;
            font-size: 15px;
        }

        .overlay .hint {
            color: #9fbed9;
            margin-top: 10px;
            margin-bottom: 0;
            font-size: 13px;
        }

        .overlay .actions {
            display: flex;
            gap: 10px;
            margin-top: 12px;
            flex-wrap: wrap;
            justify-content: center;
        }

        button.primary {
            border: 0;
            border-radius: 12px;
            padding: 12px 24px;
            color: #07101f;
            background: linear-gradient(130deg, var(--cyan), #8be1ff);
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 10px 24px rgba(97, 210, 255, 0.35);
            transition: transform 0.15s ease, box-shadow 0.15s ease;
        }

        button.primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 14px 28px rgba(97, 210, 255, 0.42);
        }

        button.primary:active {
            transform: translateY(1px);
        }

        button.primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            box-shadow: none;
        }

        #loading {
            position: absolute;
            left: 50%;
            bottom: 14px;
            transform: translateX(-50%);
            z-index: 40;
            color: #b6cce0;
            font-size: 13px;
            background: rgba(0, 0, 0, 0.35);
            border-radius: 999px;
            padding: 4px 10px;
            border: 1px solid rgba(160, 200, 240, 0.35);
        }

        .warning {
            color: #ffd5ba;
            font-size: 13px;
        }

        @media (max-width: 560px) {
            body {
                padding: 6px;
            }

            #game-shell {
                width: 96vw;
                border-radius: 14px;
            }

            #hud {
                top: 4px;
                left: 4px;
                right: 4px;
                gap: 4px;
            }

            .hud-panel {
                min-width: 90px;
                padding: 5px 6px;
            }

            .hud-label {
                font-size: 10px;
            }

            .hud-value {
                font-size: 15px;
            }

            .hud-small {
                margin-top: 2px;
                font-size: 10px;
            }

            #audio-toggle,
            #pause-toggle {
                padding: 4px 6px;
                font-size: 10px;
            }

            .hud-actions {
                gap: 3px;
            }

            #hud-controls {
                right: 4px;
                bottom: 6px;
            }

            .overlay p {
                font-size: 14px;
            }
        }

        @media (max-width: 420px) {
            .hud-panel {
                min-width: 82px;
                padding: 4px 5px;
            }

            .hud-value {
                font-size: 14px;
            }

            #audio-toggle,
            #pause-toggle {
                padding: 3px 5px;
                font-size: 9px;
            }
        }
    </style>
</head>
<body>
    <main id="game-shell" aria-label="飞机大战游戏区域">
        <canvas id="game-canvas" width="420" height="720"></canvas>

        <section id="hud" aria-live="polite">
            <div class="hud-panel">
                <div class="hud-label">Score</div>
                <div class="hud-value" id="score">0</div>
                <div class="hud-small">连击 <span id="combo">0</span></div>
            </div>
            <div class="hud-panel" style="text-align: right;">
                <div class="hud-label">生命 / 最高分</div>
                <div class="hud-value" id="lives">3</div>
                <div class="hud-small" id="best">Best 0</div>
                <div class="hud-small" id="weapon">Weapon NORMAL</div>
                <div class="hud-small" id="weapon-timer">Bomb Ready</div>
            </div>
        </section>

        <div id="hud-controls" class="hud-actions">
            <button id="audio-toggle" type="button">SOUND: ON</button>
            <button id="pause-toggle" type="button" disabled>PAUSE</button>
        </div>

        <div id="pause-pill">已暂停（P / ESC 继续）</div>

        <section id="start-overlay" class="overlay">
            <h1>飞机大战 · Enhanced</h1>
            <p>已接入新视觉素材与完整音频：敌机扩展、陨石、爆炸序列、射击/爆炸音效和循环背景音乐。</p>
            <p>键盘：方向键 / WASD 移动，P 或 ESC 暂停，R 重开，B 清屏炸弹，M 静音，[ / ] 调音量，F 全屏，H 显示/隐藏 HUD。<br>鼠标/触控：按住并拖动飞机。</p>
            <div class="actions">
                <button id="start-btn" class="primary" disabled>加载素材中...</button>
            </div>
            <p class="hint">游戏自动射击。生存越久，敌机越快且会反击。</p>
        </section>

        <section id="gameover-overlay" class="overlay hidden">
            <h2>任务失败</h2>
            <p>本局分数：<strong id="final-score">0</strong></p>
            <p>最高分：<strong id="final-best">0</strong></p>
            <div class="actions">
                <button id="restart-btn" class="primary">再来一局</button>
            </div>
            <p class="hint">按 Enter 也可以快速重开</p>
        </section>

        <div id="loading">正在加载素材...</div>
    </main>
    <script src="assets/js/final_game.js"></script>
</body>
</html>
